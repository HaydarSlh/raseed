# Raseed CI evaluation thresholds (placeholders — Phase 0).
# Each later phase replaces its gate's placeholder with a real number backed by a
# DECISIONS.md entry. CI gates read this file; a regression below threshold blocks
# merge (constitution Art. V). Phase 0 ships only lint + type-check green; the
# numeric gates below are inert placeholders until their phase lands.

# Gate 1 — categorizer (Phase 2)
# Values are null until the developer runs Colab (T027) and export (T028–T031).
# macro_f1_min is the ratcheting absolute floor: seeded from champion holdout
# macro-F1 minus a committed tolerance; can only ratchet UP, never down.
# beat_baseline_margin is always binding: champion must exceed classical baseline
# macro-F1 by at least this margin on every gate run.
# max_inference_latency_ms is a SINGLE-CALL bound (see T022/T033 for p95 benchmark).
categorizer:
  # Champion: TF-IDF+LR baseline on the cleaned laramee open-bank dataset (v2.0.0
  # taxonomy, 18 classes). Holdout macro-F1: 0.8934, val macro-F1: 0.8361.
  # Floor = holdout 0.8934 - 0.05 tolerance = 0.84. Beat-baseline margin = 0 because
  # the baseline IS the champion this phase (no DistilBERT run yet). See DECISIONS.md.
  macro_f1_min: 0.84            # ratcheting floor: holdout 0.8934 - 0.05 tolerance
  beat_baseline_margin: 0.0     # baseline is champion; margin is self-referential here
  min_per_class_f1: 0.0         # thin classes (fitness/clothes/...) governed by
                                # always_review, NOT a per-class F1 floor (see DECISIONS)
  max_inference_latency_ms: 100  # single-call measured ~10 ms; 100 ms headroom
  # Per-category operating thresholds: highest cut holding >=97% precision on val set.
  # "always_review" = fewer than 20 validation samples (N<20 rule) — the thin classes.
  operating_thresholds:
    savings: 0.94
    amazon: 0.95
    groceries: 0.93
    bills: 0.87
    cash: 0.96
    dine_out: 0.87
    income: 0.93
    travel: 0.92
    other_shopping: 0.93
    services: always_review
    entertainment: always_review
    investment: always_review
    insurance: always_review
    home_improvement: always_review
    hotels: always_review
    clothes: always_review
    mortgage: always_review
    fitness: always_review

# Gate 2 — forecaster (Phase 3)
forecaster:
  # Gate: forecaster MAE must be <= day-of-week baseline MAE on the committed golden fixture.
  # Measured by backend/tests/test_forecaster_gate.py; see R9 in research.md.
  beat_baseline: true         # CI gate passes when forecaster_mae <= baseline_mae
  mae_max: null               # absolute MAE cap deferred (relative gate is binding)

# Gate 3 — tool selection (Phase 4)
router:
  tool_selection_accuracy_min: null

# Gate 4 — RAG (Phase 4)
rag:
  hit_at_5_min: null
  mrr_min: null
  faithfulness_min: null

# Gate 5 — red-team (Phase 6)
redteam:
  max_injection_success_rate: 0.0
  max_cross_user_leak: 0

# Gate 6 — redaction (Phase 6)
redaction:
  pii_leak_count_max: 0

# Gate 7 — drift fire (Phase 5, training profile on)
drift:
  must_fire_on_simulated_drift: null

# Gate 8 — compose smoke (Phase 0 scaffold -> wired later)
compose_smoke:
  all_default_services_healthy: true
