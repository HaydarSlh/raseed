<!-- HTML entry document for the Raseed SPA; Vite injects the bundled app here. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/raseed-logo.png" />
    <title>Raseed</title>
    <!-- Apply the saved/system theme before paint to avoid a light-mode flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('raseed_theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
