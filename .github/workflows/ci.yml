# CI: lint + type-check + unit tests + integration tests (Postgres). NEVER starts
# the compose stack — CI must not depend on the running stack (constitution Art. V).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend lint + type-check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (with dev tools)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        working-directory: backend
        run: ruff check .
      - name: Mypy (type-check)
        working-directory: backend
        run: mypy .
      - name: Pytest unit tests
        working-directory: backend
        run: pytest tests/unit -q

  integration:
    name: backend integration tests (RLS + auth)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raseed_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (with dev tools)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/raseed_test
        run: alembic upgrade head
      - name: Pytest integration tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/raseed_test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/raseed_test
          JWT_SECRET: ci-test-jwt-secret
          APP_ENV: local
        run: pytest tests/integration -q

  modelserver:
    name: modelserver lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install modelserver (with dev tools)
        working-directory: modelserver
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        working-directory: modelserver
        run: ruff check .
      - name: Mypy (type-check)
        working-directory: modelserver
        run: mypy .

  frontend:
    name: frontend lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Type-check
        working-directory: frontend
        run: npm run typecheck
      - name: Lint
        working-directory: frontend
        run: npm run lint
