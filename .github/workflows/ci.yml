# CI: lint + type-check + unit tests + integration tests (Postgres). NEVER starts
# the compose stack — CI must not depend on the running stack (constitution Art. V).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend lint + type-check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (with dev tools)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        working-directory: backend
        run: ruff check .
      - name: Mypy (type-check)
        working-directory: backend
        run: mypy .
      - name: Pytest unit tests
        working-directory: backend
        env:
          APP_ENV: local
          USE_FAKE_LLM: "true"
        run: pytest tests/unit -q
      - name: Gate 2 — forecaster MAE beats day-of-week baseline
        working-directory: backend
        env:
          APP_ENV: local
        run: pytest tests/test_forecaster_gate.py -q
      - name: Gate 3 — tool-selection golden set
        working-directory: backend
        env:
          APP_ENV: local
          USE_FAKE_LLM: "true"
        run: pytest tests/test_tool_selection_gate.py -q
      - name: Gate 4 — RAG hit@5/MRR/faithfulness
        working-directory: backend
        env:
          APP_ENV: local
          USE_FAKE_LLM: "true"
        run: pytest tests/test_rag_gate.py -q
      - name: Gate 7 — drift fires on skewed fixture (stack-independent)
        working-directory: backend
        env:
          APP_ENV: local
        run: pytest tests/test_drift_gate.py -q
      - name: Gate 5 — red-team probes refused + Gate 6 Part 1 — PII pipeline check (stack-independent)
        working-directory: backend
        env:
          APP_ENV: local
        run: pytest tests/test_redteam_gate.py -q
      - name: Gate 6 Part 2 — secret scan (no hardcoded secrets in source)
        working-directory: backend
        run: |
          pip install detect-secrets -q
          cd ..
          detect-secrets scan backend/app frontend/src prompts/ --baseline .secrets.baseline --exclude-files ".*\.venv.*|.*node_modules.*|.*__pycache__.*" || true
          detect-secrets audit .secrets.baseline --report --json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('results', {})
          if results:
              print('SECRET SCAN FAILED — potential secrets found:')
              for path, secrets in results.items():
                  for s in secrets:
                      if not s.get('is_verified', False) and not s.get('is_false_positive', True):
                          print(f'  {path}: {s.get(\"type\", \"unknown\")}')
              sys.exit(1)
          print('Secret scan passed — no new secrets detected')
          "

  integration:
    name: backend integration tests (RLS + auth)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raseed_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (with dev tools)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/raseed_test
        run: alembic upgrade head
      - name: Pytest integration tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/raseed_test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/raseed_test
          JWT_SECRET: ci-test-jwt-secret
          APP_ENV: local
          USE_FAKE_LLM: "true"
        run: pytest tests/integration -q

  modelserver:
    name: modelserver lint + type-check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The model-server is a `modelserver.*` package (modelserver/logging.py shadows
      # stdlib `logging`, which forces package-qualified imports). It must therefore be
      # imported/checked from the repo root, not from inside modelserver/. We install
      # the declared deps directly (the package itself needs no build — repo root is on
      # sys.path) so the lean serving deps stay the single source of truth.
      - name: Install modelserver deps (+ dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" onnxruntime "numpy<2" tokenizers \
                      structlog pydantic-settings pyyaml \
                      ruff mypy pytest pytest-asyncio httpx onnx
      - name: Ruff (lint)
        run: ruff check modelserver
      - name: Mypy (type-check)
        run: mypy -p modelserver --config-file modelserver/pyproject.toml
      - name: Pytest unit tests
        run: pytest modelserver/tests -q

  # Gate 1 — Categorizer quality gate (Phase 2).
  # Loads champion + baseline from Git LFS, evaluates on the frozen holdout.
  # Blocks merge if champion does not beat baseline by margin or clear the floor.
  # NEVER starts the compose stack — stack-independent (constitution Art. V).
  categorizer-gate:
    name: categorizer gate (champion vs baseline on frozen holdout)
    runs-on: ubuntu-latest
    needs: [modelserver]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gate deps
        run: |
          python -m pip install --upgrade pip
          pip install onnxruntime numpy pandas pyarrow scikit-learn pyyaml tokenizers
      - name: Run categorizer gate
        run: python training/gate_holdout.py

  frontend:
    name: frontend lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Type-check
        working-directory: frontend
        run: npm run typecheck
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        run: npm run test

  # Gate 8 — Compose smoke test (Phase 7, FR-010).
  # Brings up the default docker compose profile; asserts all default services
  # become healthy and the trainer is absent. Runs only on push to main so that
  # PRs are not blocked by Docker startup time.
  # Documented exception to the stack-independent CI rule (DECISIONS.md D17).
  compose-smoke:
    name: Gate 8 — compose smoke (all default services healthy)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend test deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Copy env file
        run: cp .env.example .env
      - name: Run Gate 8 compose smoke
        env:
          APP_ENV: local
        run: pytest backend/tests/test_compose_smoke.py -m integration -v --timeout=300
