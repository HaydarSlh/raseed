# Raseed stack orchestration. `docker compose up` boots every DEFAULT service
# healthy from a copied .env; the heavy `trainer` is gated behind the `training`
# profile and never builds on a default up (constitution Art. III). Services
# address each other by service name on the compose network — never localhost.
services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:latest
    cap_add:
      - IPC_LOCK
    env_file: .env
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies the Alembic baseline then exits 0. backend waits for this.
  migrate:
    build: ./backend
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./eval_thresholds.yaml:/app/eval_thresholds.yaml:ro
      # RAG knowledge corpus (read-only) — ingested via `python -m scripts.ingest_corpus`.
      # The ingest script resolves the corpus at /rag-corpus (repo-root-relative).
      - ./rag-corpus:/rag-corpus:ro
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  modelserver:
    build: ./modelserver
    env_file: .env
    volumes:
      - ./training/taxonomy.yaml:/app/training/taxonomy.yaml:ro
      - ./eval_thresholds.yaml:/app/eval_thresholds.yaml:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    command: ["python", "-m", "app.workers.worker"]
    env_file: .env
    volumes:
      - ./eval_thresholds.yaml:/app/eval_thresholds.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    healthcheck:
      # node:20-slim has no wget/curl — use node's http module for the check.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Heavy training image — built/run ONLY with: docker compose --profile training up
  trainer:
    build: ./trainer
    profiles: ["training"]
    command: ["python", "-m", "rq", "worker", "training", "--url", "${REDIS_URL}"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
